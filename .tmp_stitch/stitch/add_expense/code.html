<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitMate - Add Expense</title>
<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          },
          colors: {
            primary: {
              DEFAULT: '#7c3bed',
              dark: '#6d28d9',
            },
            surface: {
              900: '#111827',
              800: '#1f2937',
              700: '#374151',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .amount-input::placeholder {
      color: #4b5563;
    }
  </style>
<style data-purpose="layout">
    /* Bottom sheet animation simulation */
    .bottom-sheet {
      border-radius: 24px 24px 0 0;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col justify-end">
<!-- BEGIN: BottomSheetModal -->
<main class="bottom-sheet bg-surface-900 w-full max-w-md mx-auto flex flex-col shadow-2xl overflow-hidden" data-purpose="add-expense-modal">
<!-- BEGIN: ModalHeader -->
<header class="p-4 flex flex-col items-center">
<!-- Handle bar for visual "drag" hint -->
<div class="w-12 h-1.5 bg-gray-700 rounded-full mb-6"></div>
<div class="w-full flex justify-between items-center mb-4">
<button class="text-gray-400 font-medium px-2">Cancel</button>
<h1 class="text-lg font-semibold">Add Expense</h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- END: ModalHeader -->
<section class="flex-1 px-6 pb-8 overflow-y-auto">
<!-- BEGIN: AmountSection -->
<div class="flex flex-col items-center justify-center py-8" data-purpose="amount-input-container">
<span class="text-gray-400 text-sm mb-1">How much?</span>
<div class="flex items-center">
<span class="text-4xl font-bold text-primary mr-2">$</span>
<input autofocus="" class="amount-input bg-transparent border-none text-6xl font-bold p-0 focus:ring-0 w-full text-center placeholder-gray-800" placeholder="0.00" type="number"/>
</div>
</div>
<!-- END: AmountSection -->
<!-- BEGIN: DescriptionInput -->
<div class="mb-8">
<input class="w-full bg-surface-800 border-none rounded-custom p-4 text-white focus:ring-2 focus:ring-primary placeholder-gray-500" placeholder="What was it for?" type="text"/>
</div>
<!-- END: DescriptionInput -->
<!-- BEGIN: CategoryIcons -->
<div class="mb-8" data-purpose="category-selector">
<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Category</p>
<div class="flex space-x-4 overflow-x-auto hide-scrollbar pb-2">
<!-- Food -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-white">Food</span>
</button>
<!-- Transport -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-800 flex items-center justify-center group-hover:bg-surface-700 transition">
<svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-gray-400">Travel</span>
</button>
<!-- Entertainment -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-800 flex items-center justify-center">
<svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-gray-400">Fun</span>
</button>
<!-- Grocery -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-800 flex items-center justify-center">
<svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xs font-medium text-gray-400">Groceries</span>
</button>
</div>
</div>
<!-- END: CategoryIcons -->
<!-- BEGIN: SplitToggleSection -->
<div class="mb-8" data-purpose="split-logic-toggle">
<div class="flex justify-between items-center mb-3">
<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Split Strategy</p>
<span class="text-xs text-primary font-medium underline">Details</span>
</div>
<div class="grid grid-cols-2 gap-2 bg-surface-800 p-1 rounded-custom">
<button class="bg-surface-700 py-2 rounded-custom text-sm font-semibold shadow-sm" id="split-equal">Equally</button>
<button class="py-2 rounded-custom text-sm font-medium text-gray-400" id="split-custom">Custom</button>
</div>
</div>
<!-- END: SplitToggleSection -->
<!-- BEGIN: MemberSelector -->
<div class="mb-10" data-purpose="member-selection">
<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Splitting with</p>
<div class="flex flex-wrap gap-3">
<!-- Current User (Selected) -->
<div class="flex items-center bg-primary/20 border border-primary/40 rounded-full px-4 py-2">
<img alt="You" class="w-6 h-6 rounded-full mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUmVwswnUSs1gyTv0z4jMhA4OAF3G7hCFX4TTWlka86e5tU06AlanZHM6cbU1NYhuLbadt-esnRfK-4KKzkBFniSoEZgQagiSvSnfdsNj69_vwU7-FwhVLMxOQ46lwCKNtqVn_nD53RPBh2xPXbHzg2BT3ImsNXgFQYjLxTkoLLzyi-7DQWgrVutXDpZyb1lIw-0Dt4PfC2sOV8R2S3nfkRyEXZDX8tx4PN0rmkeGe2f1L6gihMyIlTwSi9PRLl0zC3IWsTQhiSO2m"/>
<span class="text-sm font-medium">You</span>
</div>
<!-- Member 2 -->
<div class="flex items-center bg-primary/20 border border-primary/40 rounded-full px-4 py-2">
<img alt="Alex" class="w-6 h-6 rounded-full mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7roiC2aSsYp3QH862v_YijULnRG4bwTtk8rzzDgEqQ1vPR99VEZHFQUvBKQ944vA0BzyAhEMdsUx9h1fIuYZgWUr8neKPzF1hBUSh_UphcAFiMPPhMkCsLIKKC6M5xMnA8Bt97LFxLoyGTtCmRn03RLVi_H_3_M9MPinWPy5ArFEMFyVSK8vhzI5kExHldm4ALcZx3sRwmjzHdgwJ8Pe2y59qXMVOpcW90zgEh2jInploMCsN9y3IAFEjMWtRrM1OsEhCmFlf-TLd"/>
<span class="text-sm font-medium">Alex</span>
</div>
<!-- Member 3 -->
<div class="flex items-center bg-primary/20 border border-primary/40 rounded-full px-4 py-2">
<img alt="Jordan" class="w-6 h-6 rounded-full mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcP-h-bNFNGvET214dOteKuZrLQYzWElc0p5QQOQhlzb9Sncd1u40Evyln3bXpJQR1NKmpNYiVY_KcrM9Vq7de8TUV3WIrduC4_gWNSZatj9ECH1Tg5SO094A5wfpn2_F0i5VuBC2ScBbky6lKeFdfDUHyDVc0LebGk4Q8hhP6NKDsnJLSeOUx0Q1G1Uy8DxEeBvnWJ4_kiPZvLr_kmhZ9kENpFm-ZoJQ-otc1fEPKPxH8lJPcP9D0jcAaxAYb04h7iNjDLGHbpWa3"/>
<span class="text-sm font-medium">Jordan</span>
</div>
<!-- Add Button -->
<button class="w-10 h-10 rounded-full border border-dashed border-gray-600 flex items-center justify-center text-gray-400">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" fill-rule="evenodd"></path>
</svg>
</button>
</div>
</div>
<!-- END: MemberSelector -->
<!-- BEGIN: ActionButton -->
<button class="w-full bg-gradient-to-r from-primary to-primary-dark hover:opacity-90 transition-all text-white font-bold py-4 rounded-custom text-lg shadow-lg shadow-primary/20 active:scale-[0.98]">
        Create Expense
      </button>
<!-- END: ActionButton -->
</section>
</main>
<!-- END: BottomSheetModal -->
<script data-purpose="interaction-simulation">
    // Simple toggle simulation for the UI
    const btnEqual = document.getElementById('split-equal');
    const btnCustom = document.getElementById('split-custom');

    btnEqual.addEventListener('click', () => {
      btnEqual.className = 'bg-surface-700 py-2 rounded-custom text-sm font-semibold shadow-sm';
      btnCustom.className = 'py-2 rounded-custom text-sm font-medium text-gray-400';
    });

    btnCustom.addEventListener('click', () => {
      btnCustom.className = 'bg-surface-700 py-2 rounded-custom text-sm font-semibold shadow-sm';
      btnEqual.className = 'py-2 rounded-custom text-sm font-medium text-gray-400';
    });
  </script>
</body></html>
