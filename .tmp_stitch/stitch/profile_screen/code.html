<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitMate Profile</title>
<!-- Load Inter Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#7c3bed',
            surface: '#0f172a',
            glass: 'rgba(30, 41, 59, 0.7)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-glassmorphism">
    .glass-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .profile-bg-glow {
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(124, 59, 237, 0.2) 0%, rgba(124, 59, 237, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen antialiased">
<!-- BEGIN: Main Layout Container -->
<main class="relative max-w-md mx-auto px-6 pt-12 pb-24 min-h-screen overflow-hidden">
<!-- Background visual effect -->
<div aria-hidden="true" class="profile-bg-glow"></div>
<!-- BEGIN: Header Section -->
<header class="relative z-10 flex flex-col items-center mb-8" data-purpose="profile-header">
<!-- Profile Avatar Container -->
<div class="relative mb-4 group">
<div class="absolute -inset-1 bg-gradient-to-tr from-primary to-purple-400 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
<div class="relative w-28 h-28 rounded-full border-2 border-white/10 overflow-hidden bg-slate-800">
<img alt="User Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYLcqwEUxZgFlUEa8NPe0tOgcInZBPYQHZvnOB79SkrMS10yYCrbVeAzIAYtQ33Rz6Bt7b3J9HyGV2ftZ9XUIUkKH3Zysz7Kgp-ua5ZZsMgUfvQzN8Ygs38UNSNd10WBnCCCSxMyW1tk4wh0JfAorMPc-K32gaccclAR3VA-UqclxMzYi6ZinxYRTgVyYKqXumRvsS-rZ6kjHd9qfBt43n6NbaRCjaj9HrWFm1NkwlioV5GkBNjA7SFnExk4HuX3QbSARmHTd_AB53"/>
</div>
<!-- Status indicator -->
<div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-4 border-slate-950 rounded-full"></div>
</div>
<!-- Name and Handle -->
<div class="text-center">
<h1 class="text-2xl font-bold tracking-tight">Alex Sterling</h1>
<p class="text-slate-400 text-sm">@alex_splits_it</p>
</div>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Stats Row -->
<section class="grid grid-cols-2 gap-4 mb-10 relative z-10" data-purpose="user-statistics">
<!-- Groups Joined Card -->
<div class="glass-card rounded-custom p-4 flex flex-col items-center justify-center text-center">
<span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Groups</span>
<span class="text-2xl font-bold text-white">12</span>
</div>
<!-- Total Settled Card -->
<div class="glass-card rounded-custom p-4 flex flex-col items-center justify-center text-center">
<span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Settled</span>
<span class="text-2xl font-bold text-primary">$4,280</span>
</div>
</section>
<!-- END: Stats Row -->
<!-- BEGIN: Settings List -->
<nav class="space-y-3 relative z-10" data-purpose="settings-navigation">
<h2 class="text-xs font-bold text-slate-500 uppercase px-1 mb-4">Account Settings</h2>
<!-- Personal Info -->
<button class="w-full glass-card rounded-custom p-4 flex items-center justify-between hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<div class="p-2 rounded-lg bg-primary/10 text-primary">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="font-medium">Personal Information</span>
</div>
<svg class="w-5 h-5 text-slate-500 group-hover:text-slate-300 transition-colors" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Payment Methods -->
<button class="w-full glass-card rounded-custom p-4 flex items-center justify-between hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<div class="p-2 rounded-lg bg-blue-500/10 text-blue-400">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="font-medium">Payment Methods</span>
</div>
<svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Security -->
<button class="w-full glass-card rounded-custom p-4 flex items-center justify-between hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<div class="p-2 rounded-lg bg-green-500/10 text-green-400">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="font-medium">Privacy &amp; Security</span>
</div>
<svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Notifications -->
<button class="w-full glass-card rounded-custom p-4 flex items-center justify-between hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<div class="p-2 rounded-lg bg-orange-500/10 text-orange-400">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="font-medium">Notifications</span>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</button>
<!-- Logout -->
<button class="w-full mt-8 p-4 flex items-center justify-center gap-2 text-red-400 font-semibold hover:bg-red-500/5 rounded-custom transition-colors border border-red-500/20">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Sign Out
      </button>
</nav>
<!-- END: Settings List -->
<!-- BEGIN: Bottom Tab Bar (Mobile) -->
<footer class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 z-50">
<div class="max-w-md mx-auto flex items-center justify-between">
<div class="p-2 text-slate-500 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="p-2 text-slate-500 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="p-3 bg-primary rounded-full shadow-lg shadow-primary/20 -mt-8 border-4 border-slate-950">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</div>
<div class="p-2 text-slate-500 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="p-2 text-primary">
<svg class="w-6 h-6" fill="solid" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</footer>
<!-- END: Bottom Tab Bar -->
</main>
<!-- END: Main Layout Container -->
</body></html>
