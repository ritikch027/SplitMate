<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>SplitMate - OTP Verification</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#7c3bed',
            surface: '#121212',
            glass: 'rgba(255, 255, 255, 0.05)',
          },
          borderRadius: {
            'custom': '8px',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft {
      animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .glassmorphism {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-surface text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
<!-- BEGIN: VerificationContent -->
<main class="w-full max-w-sm flex flex-col items-center space-y-8" data-purpose="verification-form-container">
<!-- Header Section -->
<header class="text-center space-y-3" data-purpose="screen-header">
<div class="w-16 h-16 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-6 glassmorphism">
<svg class="h-8 w-8 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tight">Verify Identity</h1>
<p class="text-gray-400 text-sm px-4">
        We've sent a 6-digit verification code to <span class="text-gray-100 font-medium">+1 ••• ••• 8829</span>
</p>
</header>
<!-- OTP Input Section -->
<section class="w-full space-y-6" data-purpose="otp-input-area">
<div class="flex justify-between gap-2" id="otp-container">
<!-- 6 OTP Inputs -->
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-semibold bg-glass border-white/10 rounded-custom focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 glassmorphism" data-purpose="otp-digit" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-semibold rounded-custom shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" data-purpose="verify-button">
        Verify Account
      </button>
</section>
<!-- Footer Interactivity -->
<footer class="text-center space-y-4" data-purpose="verification-footer">
<div class="flex items-center justify-center space-x-2 text-sm">
<span class="text-gray-400">Resend code in</span>
<span class="text-primary font-mono font-medium" id="countdown">00:59</span>
</div>
<button class="text-sm font-medium text-gray-500 cursor-not-allowed transition-colors" disabled="" id="resend-btn">
        Didn't receive code? <span class="hover:underline">Resend</span>
</button>
</footer>
</main>
<!-- END: VerificationContent -->
<script data-purpose="otp-logic">
    // Handle OTP input jumping
    const inputs = document.querySelectorAll('input[data-purpose="otp-digit"]');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // Simple Timer Logic
    let timeLeft = 59;
    const countdownEl = document.getElementById('countdown');
    const resendBtn = document.getElementById('resend-btn');

    const timer = setInterval(() => {
      if (timeLeft <= 0) {
        clearInterval(timer);
        countdownEl.innerText = "00:00";
        resendBtn.classList.remove('text-gray-500', 'cursor-not-allowed');
        resendBtn.classList.add('text-primary', 'cursor-pointer');
        resendBtn.disabled = false;
      } else {
        let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        countdownEl.innerText = `00:${seconds}`;
      }
      timeLeft -= 1;
    }, 1000);
  </script>
</body></html>
